name: Overcast
options:
  bundleIdPrefix: com.shimondeitel.overcast
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Overcast:
    type: application
    platform: iOS
    sources:
      - path: Overcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overcast
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Overcast/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OvercastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OvercastTests
      - path: Overcast.storekit
    dependencies:
      - target: Overcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overcast.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OvercastUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OvercastUITests
    dependencies:
      - target: Overcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.overcast.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Overcast:
    build:
      targets:
        Overcast: all
        OvercastTests: [test]
        OvercastUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Overcast.storekit
    test:
      config: Debug
      storeKitConfiguration: Overcast.storekit
      targets:
        - OvercastTests
        - OvercastUITests
    archive:
      config: Release
